<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Easy Read Notepad</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f4f7fb;
      --panel: #ffffff;
      --text: #102033;
      --muted: #526274;
      --border: #c8d4e3;
      --accent: #2457ff;
      --accent-strong: #163bb0;
      --shadow: 0 18px 45px rgba(23, 37, 56, 0.12);
      --note-bg: #ffffff;
      --note-text: #0a0f17;
      --line-height: 1.75;
      --font-size: 26px;
      --font-family: Arial, Helvetica, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top left, #dfeaff 0, transparent 32rem), var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .app {
      width: min(1500px, calc(100% - 28px));
      margin: 0 auto;
      padding: 24px 0;
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(2rem, 5vw, 4rem);
      letter-spacing: -0.05em;
      line-height: 1;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 1.05rem;
    }

    .status {
      flex: 0 0 auto;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: color-mix(in srgb, var(--panel) 88%, transparent);
      color: var(--muted);
      font-weight: 700;
      box-shadow: var(--shadow);
    }

    main {
      display: grid;
      gap: 18px;
      align-items: stretch;
    }

    .toolbar,
    .editor-card {
      background: color-mix(in srgb, var(--panel) 94%, transparent);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
    }

    .toolbar {
      padding: 18px;
      display: grid;
      grid-template-columns: minmax(380px, 1.4fr) minmax(140px, 0.55fr) minmax(155px, 0.55fr) 160px auto auto;
      gap: 10px;
      height: fit-content;
      position: sticky;
      top: 16px;
      z-index: 2;
    }

    .control-group {
      display: grid;
      align-content: end;
      gap: 7px;
      min-width: 0;
    }

    label,
    .label {
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    input[type="text"],
    textarea,
    select,
    button {
      font: inherit;
    }

    input[type="text"],
    select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
      color: var(--text);
      padding: 10px 12px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      align-self: end;
    }

    button {
      min-height: 42px;
      border: 0;
      border-radius: 12px;
      padding: 9px 12px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-weight: 800;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    button:hover { background: var(--accent-strong); }
    button:active { transform: translateY(1px); }

    .secondary {
      background: #e8edf5;
      color: #152338;
    }

    .secondary:hover { background: #d7e0ef; }

    .danger {
      background: #b42318;
    }

    .danger:hover { background: #8d1b13; }

    .theme-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(82px, 1fr));
      gap: 7px;
    }

    .theme-grid button {
      min-height: 42px;
      border: 2px solid transparent;
      text-align: center;
      line-height: 1.15;
    }

    .theme-grid button.active {
      outline: 3px solid color-mix(in srgb, var(--accent) 35%, transparent);
      border-color: var(--accent);
    }

    .editor-card {
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: calc(100vh - 235px);
    }

    .editor-top {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .stats {
      align-self: center;
      color: var(--muted);
      font-weight: 700;
      white-space: nowrap;
    }

    textarea {
      width: 100%;
      flex: 1;
      min-height: 72vh;
      resize: vertical;
      border: 0;
      outline: 0;
      padding: 26px;
      background: var(--note-bg);
      color: var(--note-text);
      font-family: var(--font-family);
      font-size: var(--font-size);
      line-height: var(--line-height);
      letter-spacing: 0.01em;
    }

    textarea::placeholder {
      color: color-mix(in srgb, var(--note-text) 45%, transparent);
    }

    .help {
      margin: 0;
      padding: 12px 16px 16px;
      color: var(--muted);
      font-size: 0.93rem;
      border-top: 1px solid var(--border);
    }

    body[data-theme="dark"] {
      --bg: #080b10;
      --panel: #111722;
      --text: #f7fbff;
      --muted: #b5c2d2;
      --border: #334155;
      --accent: #7aa2ff;
      --accent-strong: #9bb9ff;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
      --note-bg: #05070a;
      --note-text: #ffffff;
    }

    body[data-theme="warm"] {
      --bg: #fff4df;
      --panel: #fffaf0;
      --text: #2d1b0d;
      --muted: #6e5136;
      --border: #e3caa5;
      --accent: #9d4e00;
      --accent-strong: #733900;
      --note-bg: #fff9ea;
      --note-text: #281500;
    }

    body[data-theme="contrast"] {
      --bg: #000000;
      --panel: #0b0b0b;
      --text: #ffffff;
      --muted: #ffffff;
      --border: #ffffff;
      --accent: #ffff00;
      --accent-strong: #fff6a0;
      --shadow: none;
      --note-bg: #000000;
      --note-text: #ffffff;
    }

    body[data-theme="contrast"] button {
      color: #000;
    }

    body[data-theme="contrast"] .secondary {
      background: #ffffff;
      color: #000000;
    }

    body[data-theme="contrast"] .danger {
      background: #ff5b5b;
      color: #000000;
    }

    body.focus-mode .toolbar,
    body.focus-mode header,
    body.focus-mode .help,
    body.focus-mode .editor-top {
      display: none;
    }

    body.focus-mode .app {
      width: 100%;
      padding: 0;
    }

    body.focus-mode main {
      display: block;
    }

    body.focus-mode .editor-card {
      min-height: 100vh;
      border: 0;
      border-radius: 0;
    }

    body.focus-mode textarea {
      min-height: 100vh;
      padding: clamp(20px, 5vw, 70px);
    }

    @media (max-width: 1100px) {
      .toolbar {
        grid-template-columns: repeat(3, minmax(180px, 1fr));
      }

      .theme-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 820px) {
      header,
      .editor-top {
        grid-template-columns: 1fr;
        flex-direction: column;
      }

      .toolbar {
        position: static;
        grid-template-columns: 1fr;
      }

      .status,
      .stats {
        width: 100%;
      }
    }
  </style>
</head>
<body data-theme="dark">
  <div class="app">
    <header>
      <div>
        <h1>Easy Read Notepad</h1>
        <p class="subtitle">A one-file notepad with large text. Auto-save stays in this browser; Download makes a real .txt file.</p>
      </div>
      <div class="status" id="saveStatus" aria-live="polite">Saved locally</div>
    </header>

    <main>
      <aside class="toolbar" aria-label="Notepad controls">
        <div class="control-group">
          <span class="label">Readable themes</span>
          <div class="theme-grid">
            <button type="button" data-theme-button="dark">White on black</button>
            <button type="button" data-theme-button="contrast">Max contrast</button>
            <button type="button" data-theme-button="light" class="secondary">Black on white</button>
            <button type="button" data-theme-button="warm" class="secondary">Warm paper</button>
          </div>
        </div>

        <div class="control-group">
          <label for="fontSize">Text size: <span id="fontSizeValue">26</span>px</label>
          <input id="fontSize" type="range" min="16" max="64" value="26">
        </div>

        <div class="control-group">
          <label for="lineHeight">Line spacing: <span id="lineHeightValue">1.75</span></label>
          <input id="lineHeight" type="range" min="1.2" max="2.4" value="1.75" step="0.05">
        </div>

        <div class="control-group">
          <label for="fontChoice">Font</label>
          <select id="fontChoice">
            <option value="Arial, Helvetica, sans-serif">Arial</option>
            <option value="Verdana, Geneva, sans-serif">Verdana</option>
            <option value="Georgia, 'Times New Roman', serif">Georgia</option>
            <option value="'Courier New', Courier, monospace">Courier New</option>
          </select>
        </div>

        <div class="button-row">
          <button type="button" id="copyButton" class="secondary">Copy</button>
          <button type="button" id="downloadButton" class="secondary">Download</button>
        </div>
        <div class="button-row">
          <button type="button" id="focusButton">Focus</button>
          <button type="button" id="clearButton" class="danger">Clear</button>
        </div>
      </aside>

      <section class="editor-card" aria-label="Notepad editor">
        <div class="editor-top">
          <input id="noteTitle" type="text" aria-label="Note title" placeholder="Untitled note">
          <div class="stats" id="stats">0 words • 0 characters</div>
        </div>
        <textarea id="noteText" spellcheck="true" placeholder="Start typing here. Your note saves automatically in this browser on this device. Use Download at the top to make a real .txt file."></textarea>
        <p class="help">Tip: choose “White on black” or “Max contrast” when white text is easiest to see. Press Esc to leave Focus mode.</p>
      </section>
    </main>
  </div>

  <script>
    const storageKey = 'easyReadNotepad.v1';
    const defaults = {
      title: '',
      text: '',
      theme: 'dark',
      fontSize: 26,
      lineHeight: 1.75,
      fontFamily: 'Arial, Helvetica, sans-serif'
    };

    const state = { ...defaults, ...loadState() };
    const elements = {
      title: document.getElementById('noteTitle'),
      text: document.getElementById('noteText'),
      saveStatus: document.getElementById('saveStatus'),
      stats: document.getElementById('stats'),
      fontSize: document.getElementById('fontSize'),
      fontSizeValue: document.getElementById('fontSizeValue'),
      lineHeight: document.getElementById('lineHeight'),
      lineHeightValue: document.getElementById('lineHeightValue'),
      fontChoice: document.getElementById('fontChoice'),
      copyButton: document.getElementById('copyButton'),
      downloadButton: document.getElementById('downloadButton'),
      focusButton: document.getElementById('focusButton'),
      clearButton: document.getElementById('clearButton')
    };

    function loadState() {
      const saved = localStorage.getItem(storageKey);
      if (!saved) return {};
      try {
        return JSON.parse(saved);
      } catch (error) {
        console.warn('Could not read saved note. Starting fresh.', error);
        return {};
      }
    }

    function saveState() {
      localStorage.setItem(storageKey, JSON.stringify(state));
      elements.saveStatus.textContent = 'Saved locally';
    }

    function setStatus(message) {
      elements.saveStatus.textContent = message;
      window.setTimeout(() => {
        elements.saveStatus.textContent = 'Saved locally';
      }, 1600);
    }

    function applyState() {
      document.body.dataset.theme = state.theme;
      document.documentElement.style.setProperty('--font-size', `${state.fontSize}px`);
      document.documentElement.style.setProperty('--line-height', state.lineHeight);
      document.documentElement.style.setProperty('--font-family', state.fontFamily);

      elements.title.value = state.title;
      elements.text.value = state.text;
      elements.fontSize.value = state.fontSize;
      elements.fontSizeValue.textContent = state.fontSize;
      elements.lineHeight.value = state.lineHeight;
      elements.lineHeightValue.textContent = Number(state.lineHeight).toFixed(2);
      elements.fontChoice.value = state.fontFamily;

      document.querySelectorAll('[data-theme-button]').forEach((button) => {
        button.classList.toggle('active', button.dataset.themeButton === state.theme);
      });

      updateStats();
    }

    function updateStats() {
      const text = elements.text.value.trim();
      const words = text ? text.split(/\s+/).length : 0;
      const characters = elements.text.value.length;
      elements.stats.textContent = `${words} words • ${characters} characters`;
    }

    function updateState(updates) {
      Object.assign(state, updates);
      applyState();
      saveState();
    }

    elements.title.addEventListener('input', () => updateState({ title: elements.title.value }));
    elements.text.addEventListener('input', () => updateState({ text: elements.text.value }));
    elements.fontSize.addEventListener('input', () => updateState({ fontSize: Number(elements.fontSize.value) }));
    elements.lineHeight.addEventListener('input', () => updateState({ lineHeight: Number(elements.lineHeight.value) }));
    elements.fontChoice.addEventListener('change', () => updateState({ fontFamily: elements.fontChoice.value }));

    document.querySelectorAll('[data-theme-button]').forEach((button) => {
      button.addEventListener('click', () => updateState({ theme: button.dataset.themeButton }));
    });

    elements.copyButton.addEventListener('click', async () => {
      const fullNote = [elements.title.value, elements.text.value].filter(Boolean).join('\n\n');
      await navigator.clipboard.writeText(fullNote);
      setStatus('Copied');
    });

    elements.downloadButton.addEventListener('click', () => {
      const fileName = `${(state.title || 'note').replace(/[^a-z0-9-_]+/gi, '-').replace(/^-|-$/g, '') || 'note'}.txt`;
      const blob = new Blob([elements.text.value], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = fileName;
      link.click();
      URL.revokeObjectURL(url);
      setStatus('Downloaded');
    });

    elements.focusButton.addEventListener('click', () => {
      document.body.classList.add('focus-mode');
      elements.text.focus();
    });

    elements.clearButton.addEventListener('click', () => {
      const shouldClear = window.confirm('Clear this note from the page and local storage?');
      if (shouldClear) {
        updateState({ title: '', text: '' });
        setStatus('Cleared');
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        document.body.classList.remove('focus-mode');
      }
    });

    applyState();
  </script>
</body>
</html>
